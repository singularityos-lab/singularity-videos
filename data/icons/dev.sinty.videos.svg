<svg width="236" height="236" viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip_videos)">

<!-- ===== BODY ===== -->
<rect x="30" y="100" width="172" height="108" rx="10" fill="rgba(0,0,0,0.28)" transform="translate(4,5)"/>
<rect x="28" y="98" width="174" height="110" rx="11" fill="#111111"/>
<rect x="29" y="99" width="173" height="109" rx="10" fill="#1e1e1e"/>
<rect x="30" y="100" width="172" height="108" rx="10" fill="url(#body_v)"/>

<mask id="body_mask_v" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="30" y="100" width="172" height="108">
  <rect x="30" y="100" width="172" height="108" rx="10" fill="white"/>
</mask>
<g mask="url(#body_mask_v)">
  <!-- B&W diagonal stripes on top strip -->
  <rect x="30" y="100" width="172" height="22" fill="url(#stripes_v)"/>
  <!-- Bloom highlight -->
  <rect x="30" y="100" width="172" height="108" fill="url(#bloom_body_v)"/>
</g>

<!-- Dark slate writing area -->
<rect x="38" y="126" width="156" height="74" rx="7" fill="url(#slate_v)"/>

<!-- Chalk lines on slate -->
<rect x="52" y="142" width="88" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
<rect x="52" y="153" width="68" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
<rect x="52" y="164" width="78" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
<text x="172" y="152" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.35)">1</text>

<!-- ===== CLAPPER ARM (open ~22 deg) ===== -->
<polygon points="30,100 30,82 202,28 202,46" fill="rgba(0,0,0,0.28)" transform="translate(4,5)"/>
<polygon points="28,100 28,80 202,26 202,46" fill="#111111"/>
<polygon points="29,100 29,81 202,27 202,46" fill="#1e1e1e"/>
<polygon points="30,100 30,82 202,28 202,46" fill="url(#arm_v)"/>

<mask id="arm_mask_v" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="30" y="28" width="172" height="72">
  <polygon points="30,100 30,82 202,28 202,46" fill="white"/>
</mask>
<g mask="url(#arm_mask_v)">
  <rect x="30" y="28" width="172" height="72" fill="url(#stripes_v)"/>
  <polygon points="30,100 30,82 202,28 202,46" fill="url(#bloom_arm_v)"/>
</g>

<!-- Hinge bolt left -->
<circle cx="33" cy="100" r="10" fill="url(#hinge_v)"/>
<circle cx="33" cy="100" r="4" fill="rgba(255,255,255,0.6)"/>

<!-- Hinge bolt right (perspective) -->
<circle cx="199" cy="37" r="6" fill="url(#hinge_v)" opacity="0.8"/>
<circle cx="199" cy="37" r="2.5" fill="rgba(255,255,255,0.5)"/>

</g>
<defs>

<linearGradient id="body_v" x1="116" y1="100" x2="116" y2="208" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#f5f5f5"/>
  <stop offset="50%" stop-color="#e0e0e0"/>
  <stop offset="100%" stop-color="#c0c0c0"/>
</linearGradient>

<linearGradient id="arm_v" x1="30" y1="63" x2="202" y2="63" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#f0f0f0"/>
  <stop offset="100%" stop-color="#d0d0d0"/>
</linearGradient>

<linearGradient id="slate_v" x1="116" y1="126" x2="116" y2="200" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#1a1a1a"/>
  <stop offset="100%" stop-color="#0a0a0a"/>
</linearGradient>

<radialGradient id="bloom_body_v" cx="70" cy="112" r="120" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
  <stop offset="100%" stop-color="white" stop-opacity="0"/>
</radialGradient>

<radialGradient id="bloom_arm_v" cx="55" cy="52" r="100" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
  <stop offset="100%" stop-color="white" stop-opacity="0"/>
</radialGradient>

<radialGradient id="hinge_v" cx="30" cy="96" r="10" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#888888"/>
  <stop offset="100%" stop-color="#333333"/>
</radialGradient>

<!-- Classic B&W diagonal clapperboard stripes -->
<pattern id="stripes_v" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
  <rect width="22" height="22" fill="white"/>
  <rect width="11" height="22" fill="#111111"/>
</pattern>

<clipPath id="clip_videos">
  <rect width="236" height="236" fill="white"/>
</clipPath>
</defs>
</svg>
